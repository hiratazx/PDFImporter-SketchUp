name: Build & Package Extension

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Poppler binaries
        shell: pwsh
        run: |
          $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v26.02.0-0/Release-26.02.0-0.zip"
          Invoke-WebRequest -Uri $url -OutFile poppler.zip -UseBasicParsing
          Expand-Archive -Path poppler.zip -DestinationPath poppler_extract -Force
          Write-Host "Poppler downloaded and extracted"

      - name: Copy required Poppler binaries
        shell: pwsh
        run: |
          $src = "poppler_extract/poppler-26.02.0/Library/bin"
          $dst = "FreePDFImport/bin"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          
          $needed = @(
            "pdftocairo.exe", "pdfinfo.exe",
            "cairo.dll", "charset.dll", "deflate.dll", "expat.dll",
            "fontconfig-1.dll", "freetype.dll", "iconv.dll", "jpeg8.dll",
            "lcms2.dll", "libcrypto-3-x64.dll", "libcurl.dll", "libexpat.dll",
            "liblzma.dll", "libpng16.dll", "libssh2.dll", "libtiff.dll",
            "libzstd.dll", "openjp2.dll", "pixman-1-0.dll",
            "poppler-cpp.dll", "poppler.dll", "tiff.dll", "zlib.dll", "zstd.dll"
          )
          
          foreach ($f in $needed) {
            Copy-Item "$src/$f" "$dst/$f" -Force
            Write-Host "  Copied: $f"
          }
          
          Write-Host "Copied $($needed.Count) Poppler binaries"

      - name: Ensure tmp directory exists
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "FreePDFImport/tmp" | Out-Null
          Set-Content -Path "FreePDFImport/tmp/.gitignore" -Value "*.svg"

      - name: Package extension as .rbz
        shell: pwsh
        run: |
          $version = "1.0.0"
          $zipName = "FreePDFImport-v${version}-windows.zip"
          $rbzName = "FreePDFImport-v${version}-windows.rbz"
          
          # Create the zip with only the extension files
          Compress-Archive -Path @(
            "FreePDFImport.rb",
            "FreePDFImport/"
          ) -DestinationPath $zipName -Force
          
          # Rename .zip to .rbz (SketchUp extension format)
          Move-Item -Path $zipName -Destination $rbzName -Force
          
          $size = [math]::Round((Get-Item $rbzName).Length / 1MB, 2)
          Write-Host "Package created: $rbzName ($size MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreePDFImport-windows
          path: FreePDFImport-v*-windows.rbz
          retention-days: 90

      - name: Upload to Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: FreePDFImport-v*-windows.rbz
          generate_release_notes: true
